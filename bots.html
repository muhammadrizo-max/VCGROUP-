<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bots — VisionCoreGroup</title>
<link rel="stylesheet" href="static/css/main.css">
<style>
  .page-hero { padding: 80px 48px 48px; max-width: 1300px; margin: 0 auto; }

  .bots-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .bot-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 28px;
    transition: all 0.3s;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bot-card:hover { transform: translateY(-3px); border-color: rgba(79,142,247,0.3); }

  .bot-icon {
    width: 56px; height: 56px;
    background: rgba(79,142,247,0.1);
    border: 1px solid var(--line);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
  }

  .bot-header { display: flex; align-items: center; gap: 14px; }
  .bot-header h3 { flex: 1; }

  .bot-desc { font-size: 0.85rem; line-height: 1.65; color: var(--muted); flex: 1; }

  .bot-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    padding-top: 14px;
    margin-top: 4px;
  }

  .bot-version {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
  }

  @media (max-width: 900px) {
    .page-hero { padding: 60px 20px 32px; }
    .bots-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="page">
  <div class="page-hero">
    <div class="section-tag">Botlar</div>
    <h1 style="margin-bottom:16px;">Bot Katalogi</h1>
    <p style="font-size:0.95rem;line-height:1.75;color:var(--muted);max-width:560px;margin-bottom:40px;">
      VisionCoreGroup tomonidan yaratilgan barcha Telegram botlari. Qidirish va filtr bilan.
    </p>
  </div>

  <div class="section" style="padding-top:0;">
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px;">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="input search-input" id="bot-search" type="text" placeholder="Bot qidirish...">
      </div>
      <div class="filter-bar" id="bot-status-filter" style="margin:0;">
        <button class="filter-btn active" data-s="all">Barchasi</button>
        <button class="filter-btn" data-s="active">● Ishlayapti</button>
        <button class="filter-btn" data-s="planned">◌ Rejada</button>
      </div>
    </div>

    <div class="bots-grid" id="bots-grid">
      <!-- Populated by JS -->
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<div id="ai-placeholder"></div>

<script src="static/js/main.js"></script>
<script src="static/js/components.js"></script>
<script>
const botEmoji = { food: '🍔', education: '📚', automation: '⚡', business: '💼' };
let botStatus = 'all';
let botSearch = '';

function renderBots() {
  const projects = DB.get('projects') || [];
  const grid = document.getElementById('bots-grid');
  grid.innerHTML = '';

  const filtered = projects.filter(p => {
    const ms = botStatus === 'all' || p.status === botStatus;
    const mq = !botSearch || p.name.toLowerCase().includes(botSearch) || p.description.toLowerCase().includes(botSearch);
    return ms && mq;
  });

  if (filtered.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:80px;color:var(--muted);">🔍 Hech narsa topilmadi</div>`;
    return;
  }

  filtered.forEach(p => {
    grid.innerHTML += `
      <div class="bot-card reveal">
        <div class="bot-header">
          <div class="bot-icon">${botEmoji[p.category] || '🤖'}</div>
          <div>
            <h3 style="font-size:1rem;">${p.name}</h3>
            <div class="bot-version">${p.version}</div>
          </div>
          ${statusBadge(p.status)}
        </div>
        <p class="bot-desc">${p.description}</p>
        <div class="tag-list">
          ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
        </div>
        <div class="bot-footer">
          <span class="bot-version">👁 ${p.views.toLocaleString()} ko'rishlar</span>
          ${p.bot_link
            ? `<a href="${p.bot_link}" target="_blank" class="btn btn-sm btn-primary">🤖 Ochish →</a>`
            : `<span class="btn btn-sm btn-ghost" style="opacity:0.5;cursor:default;">Tez orada</span>`}
        </div>
      </div>`;
  });

  initReveal();
}

document.addEventListener('DOMContentLoaded', () => {
  trackView('bots');
  renderBots();

  document.getElementById('bot-search').addEventListener('input', e => {
    botSearch = e.target.value.toLowerCase();
    renderBots();
  });

  document.getElementById('bot-status-filter').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    botStatus = btn.dataset.s;
    document.querySelectorAll('#bot-status-filter .filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderBots();
  });
});
</script>
</body>
</html>
